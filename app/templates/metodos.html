<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagos O.R.I.O.</title>
    <link rel="stylesheet" href="../static/css/pagos_x_metodo.css">
</head>
<body>

    <div class="container">
        
        <div id="escena-seleccion" class="contenedor-grid">
            <div class="tarjeta-pago">
                <div class="icono-pago"><img src="../static/img/nequi.png"></div>
                <h3>Nequi</h3>
                <p>Paga desde tu celular</p>
                <button class="boton-pago" onclick="abrirPago('nequi')">Seleccionar</button>
            </div>

            <div class="tarjeta-pago">
                <div class="icono-pago"><img src="../static/img/paypal.png"></div>
                <h3>PayPal</h3>
                <p>Pago seguro online</p>
                <button class="boton-pago" onclick="abrirPago('paypal')">Seleccionar</button>
            </div>

            <div class="tarjeta-pago">
                <div class="icono-pago"><img src="../static/img/bancolombia.png"></div>
                <h3>Bancolombia</h3>
                <p>Transferencia bancaria</p>
                <button class="boton-pago" onclick="abrirPago('bancolombia')">Seleccionar</button>
            </div>

            <div class="tarjeta-pago">
                <div class="icono-pago"><img src="../static/img/efecty.png"></div>
                <h3>Efecty</h3>
                <p>Pago en efectivo</p>
                <button class="boton-pago" onclick="abrirPago('efecty')">Seleccionar</button>
            </div>
        </div>

        <div id="escena-detalle" class="layout-vertical" style="display: none;">
            
            <div class="tarjeta-formulario">
                <button onclick="volverAtras()" class="btn-volver">← Volver a métodos</button>
                <div id="preguntas-dinamicas">
                    </div>
            </div>

            <div class="tarjeta-menu-lateral">
                <h4>Cambiar método:</h4>
                <div class="opcion-mini" onclick="actualizarPreguntas('nequi')">Nequi</div>
                <div class="opcion-mini" onclick="actualizarPreguntas('paypal')">PayPal</div>
                <div class="opcion-mini" onclick="actualizarPreguntas('bancolombia')">Bancolombia</div>
                <div class="opcion-mini" onclick="actualizarPreguntas('efecty')">Efecty</div>
            </div>

        </div>

    </div>

    <script src="../static/js/metodos.js"></script>
</body>
</html>
