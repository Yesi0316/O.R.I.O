<!DOCTYPE html>
<html lang="es"{% if theme and theme != 'claro' %} class="modo-{{ theme }}"{% endif %}>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportar cuenta | O.R.I.O</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/reporte_problemas.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/modos.css') }}">
</head>

<body{% if theme and theme != 'claro' %} class="modo-{{ theme }}"{% endif %}>

<main>

<div class="contenedor" id="formulario">

<h2>Reportar cuenta</h2>

<p class="descripcion">
Si una cuenta está incumpliendo las normas de O.R.I.O puedes reportarla. Nuestro sistema revisará el caso.
</p>

<form onsubmit="enviarReporte(event)">

<label>Usuario a reportar</label>
<input type="text" required>

<label>Razón del reporte</label>
<select required>
<option value="">Seleccionar motivo</option>
<option>Información falsa</option>
<option>Suplantación de identidad</option>
<option>Contenido inapropiado</option>
<option>Acoso o comportamiento ofensivo</option>
<option>Spam o publicidad</option>
<option>Uso indebido del aplicativo</option>
<option>Otro</option>
</select>

<label>Descripción</label>
<textarea placeholder="Explica lo sucedido..." required></textarea>

<label>Correo (opcional)</label>
<input type="email">

<button type="submit">Enviar reporte</button>

</form>

</div>

<div class="contenedor success" id="exito">

<div class="check">✔</div>

<h2>Reporte enviado</h2>

<p class="mensaje">
Tu reporte fue enviado correctamente.  
El equipo de O.R.I.O revisará la situación.
</p>

</div>

</main>

<footer>
    © 2025 O.R.I.O. Todos los derechos reservados.
</footer>+
<script>

function enviarReporte(e){

    e.preventDefault()

    const formulario = document.getElementById("formulario")
    const exito = document.getElementById("exito")

    if(formulario){
        formulario.style.display = "none"
    }

    setTimeout(() => {

        if(exito){
            exito.style.display = "block"
        }

    }, 500)

    setTimeout(() => {

        window.location.href = "/menu"

    }, 2000)

}

/* -------- PROTECCIÓN PARA ERRORES DE addEventListener -------- */

const sidebarProfile = document.getElementById("sidebarProfile")

if(sidebarProfile){

    sidebarProfile.addEventListener("click", function(){

        console.log("Sidebar abierta")

    })

}

</script>

</body>
</html>
