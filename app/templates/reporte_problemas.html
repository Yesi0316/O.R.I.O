<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportar cuenta | O.R.I.O</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#020617);
background-size:300% 300%;
animation:fondo 10s infinite alternate;
}

@keyframes fondo{
0%{background-position:left;}
100%{background-position:right;}
}

.contenedor{
background:white;
padding:35px;
width:420px;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.4);
animation:aparecer 0.8s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
margin-bottom:10px;
color:#0f172a;
}

.descripcion{
font-size:14px;
color:#555;
margin-bottom:20px;
}

label{
font-weight:600;
display:block;
margin-top:14px;
}

input,select,textarea{
width:100%;
margin-top:6px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
transition:0.3s;
}

input:focus,select:focus,textarea:focus{
outline:none;
border-color:#0f172a;
box-shadow:0 0 5px rgba(15,23,42,0.4);
}

textarea{
height:90px;
resize:none;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#0f172a;
color:white;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
background:#1e293b;
}

.success{
display:none;
text-align:center;
animation:aparecer 0.6s ease;
}

.check{
font-size:60px;
color:#16a34a;
animation:pop 0.5s ease;
}

@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}

.mensaje{
margin-top:15px;
font-size:16px;
color:#333;
}

</style>
</head>

<body>

<div class="contenedor" id="formulario">

<h2>Reportar cuenta</h2>

<p class="descripcion">
Si una cuenta está incumpliendo las normas de O.R.I.O puedes reportarla. Nuestro sistema revisará el caso.
</p>

<form onsubmit="enviarReporte(event)">

<label>Usuario a reportar</label>
<input type="text" required>

<label>Razón del reporte</label>
<select required>
<option value="">Seleccionar motivo</option>
<option>Información falsa</option>
<option>Suplantación de identidad</option>
<option>Contenido inapropiado</option>
<option>Acoso o comportamiento ofensivo</option>
<option>Spam o publicidad</option>
<option>Uso indebido del aplicativo</option>
<option>Otro</option>
</select>

<label>Descripción</label>
<textarea placeholder="Explica lo sucedido..." required></textarea>

<label>Correo (opcional)</label>
<input type="email">

<button type="submit">Enviar reporte</button>

</form>

</div>


<div class="contenedor success" id="exito">

<div class="check">✔</div>

<h2>Reporte enviado</h2>

<p class="mensaje">
Tu reporte fue enviado correctamente.  
El equipo de O.R.I.O revisará la situación.
</p>

</div>


<script>

function enviarReporte(e){

e.preventDefault()

document.getElementById("formulario").style.display="none"

setTimeout(()=>{

document.getElementById("exito").style.display="block"

},500)

}

</script>

</body>
</html>
