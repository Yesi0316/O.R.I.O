{% extends 'base.html' %}

{% block title %}Buzón | O.R.I.O{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/buzon.css') }}">
{% endblock %}

{% block content %}
<div class="header">
    <h1><i class="fas fa-envelope"></i> Buzón</h1>
    <p>Revisa tus mensajes y avisos importantes desde aquí.</p>
</div>

<section class="buzon-card">
    <div class="buzon-header">
        <div>
            <h2>Mis mensajes</h2>
        </div>
        <div class="buzon-actions">
            <button type="button" onclick="openCompose()"><i class="fas fa-pen"></i> Nuevo mensaje</button>
            <button type="button" class="secondary" onclick="refreshBuzon()"><i class="fas fa-sync-alt"></i> Refrescar</button>
        </div>
    </div>

    <div id="composePanel" class="new-message-panel hidden">
        <h2>Escribir mensaje</h2>
        <div class="form-row">
            <label for="composeTo">Para (usuario)</label>
            <input id="composeTo" type="text" placeholder="ID del destinatario">
        </div>
        <div class="form-row">
            <label for="composeSubject">Asunto</label>
            <input id="composeSubject" type="text" placeholder="Asunto del mensaje">
        </div>
        <div class="form-row">
            <label for="composeBody">Mensaje</label>
            <textarea id="composeBody" rows="5" placeholder="Escribe tu mensaje aquí..."></textarea>
        </div>
        <div class="form-row">
            <label for="composeFiles">Adjuntos (imagen/archivo)</label>
            <input id="composeFiles" type="file" multiple>
        </div>
        <div class="form-actions">
            <button class="btn-outline" type="button" onclick="closeCompose()">Cancelar</button>
            <button class="btn" type="button" onclick="sendMessage()">Enviar</button>
        </div>
    </div>

    <div>
        <h2>Conversaciones</h2>
        <ul class="buzon-list" id="messageList">
            <li class="buzon-empty">Cargando conversaciones...</li>
        </ul>
    </div>
</section>

<script>
function openCompose() {
    document.getElementById('composePanel').classList.remove('hidden');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeCompose() {
    document.getElementById('composePanel').classList.add('hidden');
}

function refreshBuzon() {
    fetch('/api/conversaciones')
        .then(r => r.json())
        .then(data => {
            const list = document.getElementById('messageList');
            if (!data || data.length === 0) {
                list.innerHTML = '<li class="buzon-empty">No hay conversaciones activas.</li>';
                return;
            }
            list.innerHTML = '';
            data.forEach(thread => {
                const li = document.createElement('li');
                li.className = 'message-item ' + (thread.unread > 0 ? 'unread' : '');
                li.onclick = () => {
                    const objetoSegment = thread.id_objeto ? '/' + thread.id_objeto : '/0';
                    window.location.href = `/chat/${thread.destinatario}${objetoSegment}`;
                };
                const preview = thread.ultimo_asunto || thread.ultimo_mensaje || 'Sin mensajes aún';
                li.innerHTML = `<div><strong>${thread.nombre}</strong><span>${thread.objeto_nombre} · ${preview.substring(0,120)}${preview.length > 120 ? '...' : ''}</span></div><span>${thread.ultima_fecha || ''}</span>`;
                list.appendChild(li);
            });
        })
        .catch(e => console.error('Error refrescando buzón', e));
}

document.addEventListener('DOMContentLoaded', refreshBuzon);

function sendMessage() {
    const to = document.getElementById('composeTo').value.trim();
    const subject = document.getElementById('composeSubject').value.trim();
    const body = document.getElementById('composeBody').value.trim();
    if (!to || !body) {
        alert('Por favor completa destinatario y mensaje.');
        return;
    }
    const files = document.getElementById('composeFiles').files;
    const fd = new FormData();
    fd.append('destinatario', to);
    fd.append('asunto', subject);
    fd.append('cuerpo', body);
    for (let i=0;i<files.length;i++) fd.append('adjuntos', files[i]);

    fetch('/api/mensajes/enviar', { method: 'POST', body: fd })
        .then(r => r.json())
        .then(resp => {
            if (resp.ok) {
                alert('Mensaje enviado');
                document.getElementById('composeTo').value = '';
                document.getElementById('composeSubject').value = '';
                document.getElementById('composeBody').value = '';
                document.getElementById('composeFiles').value = '';
                closeCompose();
                refreshBuzon();
            } else {
                alert('Error: ' + (resp.error || 'No enviado'));
            }
        })
        .catch(e => { console.error(e); alert('Error enviando mensaje') });
}

function viewMessage(id) {
    fetch(`/api/mensajes/${id}`)
        .then(r => r.json())
        .then(resp => {
            if (!resp.ok) return alert('No se pudo abrir el mensaje');
            const m = resp.mensaje;
            let text = `De: ${m.ID_REMITENTE}\nAsunto: ${m.ASUNTO || '(sin asunto)'}\nFecha: ${m.FECHA}\n\n${m.CUERPO}`;
            if (resp.adjuntos && resp.adjuntos.length) {
                text += '\n\nAdjuntos:\n';
                resp.adjuntos.forEach(a => {
                    text += `- ${a.NOMBRE_ORIGINAL} -> ${a.RUTA}\n`;
                });
            }
            alert(text);
            refreshBuzon();
        })
        .catch(e => console.error(e));
}

</script>
{% endblock %}
