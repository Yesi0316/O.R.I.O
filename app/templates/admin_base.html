<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}Panel Administrador | O.R.I.O{% endblock %}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_base.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


 <link rel="stylesheet"
href="{{ url_for('static', filename='css/modos.css') }}"> 

<script>
window.addEventListener('DOMContentLoaded', async function() {
    try {
        const response = await fetch('/api/tema/obtener');
        const data = await response.json();

        if (data.ok) {
            const tema = data.tema;
            document.body.classList.remove('modo-oscuro', 'modo-alto-contraste');
            if (tema && tema !== 'claro') {
                document.body.classList.add('modo-' + tema);
            }
        }
    } catch (e) {
        console.error('Error cargando tema:', e);
    }
});
</script>

{% block extra_css %}{% endblock %}

</head>

<body>

<!-- SIDEBAR ADMIN -->

<div class="sidebar" id="sidebar">

    <a href="#"
   class="sidebar-profile"
   onclick="openProfileModal(event)">

    <img id="sidebarProfileImg"
         src="/static/img/image.png"
         alt="Perfil">

</a>

    <!-- MENU ADMIN -->
    <div class="menu">

        <a href="/admin_inicio"
           class="{{ 'active' if active=='panel' else '' }}">

            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>

        </a>

        <a href="/admin_reportes"
           class="{{ 'active' if active=='reportes' else '' }}">

            <i class="fas fa-box-open"></i>
            <span>Reportes</span>

        </a>

        <a href="/admin_buzon" class="nav-item {{ 'active' if active=='buzon' else '' }}" id="buzoneLink">
            <i class="fas fa-envelope"></i>
            <span>Buzón</span>
            <span class="menu-badge" id="buzoneCounter"></span>
        </a>

        <a href="/usuarios"
           class="{{ 'active' if active=='usuarios' else '' }}">

            <i class="fas fa-users"></i>
            <span>Usuarios</span>

        </a>

        <a href="/admin/perfil"
           class="{{ 'active' if active=='perfil' else '' }}">

            <i class="fas fa-chart-line"></i>
            <span>Perfil</span>

        </a>

        <a href="/admin/configuracion"
           class="{{ 'active' if active=='configuracion' else '' }}">

            <i class="fas fa-cog"></i>
            <span>Configuración</span>

        </a>

    </div>

    <!-- BOTON SIDEBAR -->
    <div class="toggle" onclick="toggleSidebar()">

        <i class="fas fa-angle-left" id="toggleIcon"></i>

    </div>

</div>

<!-- MAIN -->

<div class="main">

    {% block content %}{% endblock %}

    <!-- MODAL -->
    <div id="cerrarModal" class="modal">
        <div class="modal-content">

            <h2>Cerrar sesión</h2>

            <p>
                ¿Estás seguro de que deseas cerrar sesión?
            </p>

            <div class="modal-buttons">

                <button class="btn-danger" onclick="confirmcerrar()">
                    Sí, cerrar sesión
                </button>

                <button class="btn-cancel" onclick="cerrarModal()">
                    Cancelar
                </button>

            </div>

        </div>
    </div>

</div>

<!-- Modal perfil -->
<div class="profile-modal-backdrop" id="profileModal">
    <div class="profile-modal" role="dialog" aria-modal="true">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <h3 style="margin:0;">Mi perfil</h3>
            <button class="close-btn" onclick="closeProfileModal()">&times;</button>
        </div>
        <div class="head">
            <img id="modalImg" src="https://via.placeholder.com/200" alt="Foto">
            <div class="info">
                <div><b id="modalNombre">Nombre Apellido</b></div>
                <div id="modalTelefono" style="font-size:13px;color:#666;margin-top:6px;"></div>
                <div id="modalCorreo" style="font-size:13px;color:#666;margin-top:4px;"></div>
            </div>
        </div>
        <div style="margin-top:12px;">
            <a href="/admin_perfil" class="tarjeta-btn" style="display:inline-block;text-decoration:none;">Editar perfil</a>
        </div>
    </div>
</div>



<!-- JS -->

<script>

document.addEventListener("click", function(e){

    const modal = document.getElementById("profileModal");

    if(
        modal.classList.contains("active") &&
        e.target === modal
    ){
        closeProfileModal();
    }

});

function toggleSidebar(){

    const sidebar = document.getElementById("sidebar");
    const icon = document.getElementById("toggleIcon");

    sidebar.classList.toggle("collapsed");

    if(sidebar.classList.contains("collapsed")){

        icon.classList.replace(
            "fa-angle-left",
            "fa-angle-right"
        );

    } else {

        icon.classList.replace(
            "fa-angle-right",
            "fa-angle-left"
        );

    }

}

function abrirModal(event) {
    event.preventDefault();
    document.getElementById("cerrarModal").style.display = "flex";
}

function cerrarModal() {
    document.getElementById("cerrarModal").style.display = "none";
}

function confirmcerrar() {
    
    window.location.href = "/logout";
}
function openProfileModal(event){

    event.preventDefault();

    document
        .getElementById("profileModal")
        .classList.add("active");
}

function closeProfileModal(){

    document
        .getElementById("profileModal")
        .classList.remove("active");
}


document.addEventListener('DOMContentLoaded', async function(){

    try{

        const res = await fetch('/datos_perfil');
        const data = await res.json();

        if(data.ok && data.datos){

            const perfil = data.datos;

            const foto =
                perfil.FOTO_PERFIL ||
                '/static/img/image.png';

            document.getElementById('sidebarProfileImg').src = foto;
            document.getElementById('modalImg').src = foto;

            document.getElementById('modalNombre').textContent =
                perfil.NOMBRE ||
                perfil.NOMBRE_USUARIO ||
                perfil.USUARIO ||
                'Usuario';

            document.getElementById('modalTelefono').textContent =
                perfil.TELEFONO || '';

            document.getElementById('modalCorreo').textContent =
                perfil.CORREO || '';
        }

    }catch(e){

        console.error(e);

    }

});
</script>

</body>
</html>
