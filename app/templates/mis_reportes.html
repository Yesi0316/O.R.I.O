{% extends "base.html" %}

{% block title %}Mis Reportes | O.R.I.O{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/mis_reportes.css') }}">

{% endblock %}

{% block content %}

<div class="dashboard-title" style="margin-bottom:18px;">
  <div>
    <h1>Mis Reportes</h1>
    <p class="subtitle">Consulta todos tus reportes de objetos perdidos y encontrados</p>
  </div>
</div>

<div class="search-section">
  <div class="search-bar">
    <i class="fas fa-search"></i>
    <input type="text" id="buscarReportes" placeholder="Buscar por nombre o color..." autocomplete="off">
  </div>

  <div class="filters-row">
    <label class="filter-pill">
      <i class="fas fa-tag"></i>
      <select id="filtroTipo" class="filter-select">
        <option value="">Tipos</option>
        <option value="perdido">Perdido</option>
        <option value="encontrado">Encontrado</option>
      </select>
    </label>

    <label class="filter-pill">
      <i class="fas fa-th-large"></i>
      <select id="filtroCategoria" class="filter-select">
        <option value="">Categorías</option>
        <option value="Documentos">Documentos</option>
        <option value="Tecnología">Tecnología</option>
        <option value="Accesorios">Accesorios</option>
        <option value="Ropa">Ropa</option>
        <option value="Llaves">Llaves</option>
        <option value="Otros">Otros</option>
      </select>
    </label>

    <div class="filter-tools">
      <input type="date" id="filtroFechaInicio" class="filter-date-input" placeholder="Desde">
      <input type="date" id="filtroFechaFin" class="filter-date-input" placeholder="Hasta">
      <button id="resetFiltros" class="filter-reset-btn">
        <i class="fas fa-redo"></i> Limpiar filtros
      </button>
      <button id="descargarPDF" class="filter-download-btn">
        <i class="fas fa-download"></i> Descargar PDF
      </button>
    </div>
  </div>
</div>

<div id="reportesGrid" class="grid-resultados" style="margin-top:18px;">
  <!-- tarjetas se insertan aquí -->
</div>

<script src="{{ url_for('static', filename='js/report-card.js') }}"></script>
<script>
const buscarInput = document.getElementById('buscarReportes');
const filtroTipo = document.getElementById('filtroTipo');
const filtroCategoria = document.getElementById('filtroCategoria');
const filtroFechaInicio = document.getElementById('filtroFechaInicio');
const filtroFechaFin = document.getElementById('filtroFechaFin');
const resetFiltros = document.getElementById('resetFiltros');
const descargarPDF = document.getElementById('descargarPDF');
const grid = document.getElementById('reportesGrid');
let allReportes = [];

async function cargarReportes(){
  try{
    grid.innerHTML = '<div class="recent-placeholder">Cargando reportes...</div>';

    const params = new URLSearchParams();
    
    if(filtroCategoria.value) {
      params.append('categoria', filtroCategoria.value);
    }
    
    if(filtroTipo.value) {
      params.append('tipo', filtroTipo.value);
    }
    
    if(filtroFechaInicio.value) {
      params.append('fecha_inicio', filtroFechaInicio.value);
    }
    
    if(filtroFechaFin.value) {
      params.append('fecha_fin', filtroFechaFin.value);
    }
    
    const url = '/api/mis_reportes' + (params.toString() ? '?' + params.toString() : '');
    const res = await fetch(url);
    const data = await res.json();
    
    if (!data.ok) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#c33;">Error cargando reportes</div>';
      return;
    }
    
    allReportes = data.datos || [];
    renderizar();
  }catch(e){
    console.error(e);
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#c33;">Error en la solicitud</div>';
  }
}

function renderizar(){
  const q = buscarInput.value.trim().toLowerCase();
  const tipo = filtroTipo.value;

  let filtrados = allReportes.filter(r => {
    if (tipo && r.tipo !== tipo) return false;
    if (!q) return true;
    return (r.NOMBRE || r.nombre || '').toLowerCase().includes(q) || (r.COLOR || r.color || '').toLowerCase().includes(q);
  });

  filtrados = filtrados.sort((a,b) => {
    const fechaA = new Date(a.FECHA || a.fecha || a.Fecha || 0).getTime();
    const fechaB = new Date(b.FECHA || b.fecha || b.Fecha || 0).getTime();
    return fechaB - fechaA;
  });

  if (filtrados.length === 0){
    renderReportCards(grid, [], { emptyMessage: 'No hay reportes que coincidan con los filtros seleccionados' });
    return;
  }

  renderReportCards(grid, filtrados, {
    showDeleteButton: true,
    clickable: false,
    onDelete: borrarReporte,
    onCardClick: (href) => window.location.href = href,
    userName: '{{ session.get("nombre")|e }}{{ " " if session.get("apellido") else "" }}{{ session.get("apellido")|e }}',
  });
}

buscarInput.addEventListener('input', renderizar);
filtroTipo.addEventListener('change', renderizar);
filtroCategoria.addEventListener('change', cargarReportes);
filtroFechaInicio.addEventListener('change', cargarReportes);
filtroFechaFin.addEventListener('change', cargarReportes);

resetFiltros.addEventListener('click', () => {
  buscarInput.value = '';
  filtroTipo.value = '';
  filtroCategoria.value = '';
  filtroFechaInicio.value = '';
  filtroFechaFin.value = '';
  cargarReportes();
});

function attachCardClicks() {
  document.querySelectorAll('.tarjeta-resultado[data-href]').forEach(card => {
    if (card.dataset.clickAttached) return;
    card.addEventListener('click', (event) => {
      if (event.target.closest('.tarjeta-borrar')) return;
      const href = card.dataset.href;
      if (href) window.location.href = href;
    });
    card.dataset.clickAttached = '1';
  });
}

descargarPDF.addEventListener('click', async () => {
  if(allReportes.length === 0) {
    alert('No hay reportes para descargar');
    return;
  }

  descargarPDF.disabled = true;
  descargarPDF.textContent = '⏳ Generando PDF...';

  try {
    const payload = {
      categoria: filtroCategoria.value || null,
      fecha_inicio: filtroFechaInicio.value || null,
      fecha_fin: filtroFechaFin.value || null,
      tipo: filtroTipo.value || null,
      busqueda: buscarInput.value.trim() || null
    };

    const res = await fetch('/api/descargar_reportes', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      const data = await res.json();
      alert(data.error || 'Error al generar el PDF');
      return;
    }

    // Descargar el PDF
    const blob = await res.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `reportes_${new Date().toISOString().slice(0,10)}.pdf`;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);

  } catch(e) {
    console.error(e);
    alert('Error al descargar el PDF');
  } finally {
    descargarPDF.disabled = false;
    descargarPDF.innerHTML = '<i class="fas fa-download"></i> Descargar PDF';
  }
});

cargarReportes();

async function borrarReporte(id, tipo){
  if(!confirm('¿Seguro que deseas borrar este reporte?')) return;
  try{
    const res = await fetch('/api/borrar_reporte', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id_reporte: id, tipo: tipo})
    });
    const data = await res.json();
    if(!data.ok){
      alert(data.error || 'No se pudo borrar el reporte');
      return;
    }
    // eliminar del array local y re-renderizar
    allReportes = allReportes.filter(r => {
      const rid = r.id_reporte || r.ID_REPORTE || r.ID_REPORTE_ENC || r.id;
      return String(rid) !== String(id);
    });
    renderizar();
  }catch(e){
    console.error(e);
    alert('Error al borrar el reporte');
  }
}
</script>

{% endblock %}
