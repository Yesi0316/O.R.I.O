{% extends "admin_base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/usuarios.css') }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
{% endblock %}

{% block content %}

<h1>Gestión de Usuarios</h1>

<div class="admin-section">

    <div class="form-asignar-admin">
        <input
            type="text"
            id="nombreUsuario"
            placeholder="buscar usuario"
        >
    </div>
</div>

<h2>Lista de Usuarios</h2>

<div class="tabla-usuarios">

    <!-- Encabezados -->
    <div class="tabla-header">
    <div>Nombre</div>
    <div>Usuario</div>
    <div>Género</div>
    <div>Rol</div>
    <div>Acciones</div>
</div>

    <!-- Aquí se cargan automáticamente -->
    <div class="usuario-lista"></div>

</div>

<div id="mensajeResultado" class="mensaje"></div>

<script>

const usuarioLista = document.querySelector(".usuario-lista");
const inputNombre = document.getElementById("nombreUsuario");
const btnAsignar = document.getElementById("btnAsignarAdmin");
const mensajeDiv = document.getElementById("mensajeResultado");

/* ==========================================
   CARGAR USUARIOS
========================================== */

function cargarUsuarios() {

    fetch("/api/usuarios", {
        credentials: "same-origin"
    })

    .then(r => r.json())

    .then(usuarios => {

        usuarioLista.innerHTML = '';

        usuarios.forEach(usuario => {

            const inicial =
                usuario.NOMBRE
                ? usuario.NOMBRE.charAt(0).toUpperCase()
                : '?';

            const usuarioElemento = document.createElement("div");

            usuarioElemento.classList.add("usuario-item");

            usuarioElemento.innerHTML = `

                <div class="col nombre">

                    <div class="avatar">
                        ${inicial}
                    </div>

                    <span>
                        ${usuario.NOMBRE}
                    </span>

                </div>

                <div class="col usuario">
                    ${usuario.ID_USUARIO}
                </div>

                <div class="col genero">
                    ${usuario.GENERO}
                </div>

                <span class="badge-rol">
                    ${
                    usuario.ROL_NOMBRE || "Sin rol"
                    }
</span>

                <div class="col acciones">

                    <button
                        class="btn-accion btn-admin"
                        title="Hacer Administrador"
                        data-id="${usuario.ID_USUARIO}"
                        onclick="asignarAdmin('${usuario.ID_USUARIO}')">

                        <i class="fas fa-user-shield"></i>

                    </button>

                    <button
                        class="btn-accion btn-quitar"
                        title="Quitar Rol"
                        data-id="${usuario.ID_USUARIO}"
                        onclick="quitarAdmin('${usuario.ID_USUARIO}')">

                        <i class="fas fa-user-minus"></i>

                    </button>

                    <button
                        class="btn-accion btn-eliminar"
                        title="Eliminar Usuario" 
                        onclick="eliminarUsuario('${usuario.ID_USUARIO}')">
                        <i class="fas fa-trash-alt"></i>

                    </button>

                </div>

            `;

            usuarioLista.appendChild(usuarioElemento);

        });

    })

    .catch(error => {
        console.error("Error:", error);
    });
}
/* ==========================================
   ASIGNAR ADMIN
========================================== */

async function asignarAdmin(id_usuario) {

        const response = await fetch("/api/cambiar_rol_admin", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            credentials: "same-origin",

            body: JSON.stringify({
                id_usuario: id_usuario
            })

        });

        const data = await response.json();

        if (data.ok) {

            mensajeDiv.className = "mensaje exito";
            mensajeDiv.textContent = data.mensaje;

            inputNombre.value = '';

            cargarUsuarios();

            setTimeout(() => {
                mensajeDiv.textContent = '';
            }, 3000);

        } else {

            mensajeDiv.className = "mensaje error";
            mensajeDiv.textContent = data.mensaje;

            setTimeout(() => {
                mensajeDiv.textContent = '';
            }, 3000);

        }

    };

/* ==========================================
   QUITAR ADMIN
========================================== */

async function quitarAdmin(id_usuario) {

        const response = await fetch("/api/cambiar_rol_usuario", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            credentials: "same-origin",

            body: JSON.stringify({
                id_usuario: id_usuario
            })
}        );

        const data = await response.json();

        if (data.ok) {

            mensajeDiv.className = "mensaje exito";
            mensajeDiv.textContent = data.mensaje;

            inputNombre.value = '';

            cargarUsuarios();

            setTimeout(() => {
                mensajeDiv.textContent = '';
            }, 3000);

        } else {

            mensajeDiv.className = "mensaje error";
            mensajeDiv.textContent = data.mensaje;

            setTimeout(() => {
                mensajeDiv.textContent = '';
            }, 3000);

        }

    };

/* ==========================================
INICIAR
========================================== */

cargarUsuarios();

/* ==========================================
    ELIMINAR USUARIO
========================================== */

async function eliminarUsuario(id_usuario) {
    if (!confirm("¿Estás seguro de que deseas eliminar este usuario?")) {
        return;
    }

    try {
        const res = await fetch("/api/admin_borrar_usuario", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id_usuario })
        });
        const response = await res.json();
        if (response.ok) {
            alert("Usuario eliminado exitosamente.");
            location.reload();
        } else {
            alert("Error al eliminar el usuario: " + (response.error || "Error desconocido"));
        }
    } catch (error) {
        console.error("Error:", error);
    }
};

/* ==========================================
    BUSCAR USUARIOS 
========================================== */

    const q = inputNombre.value.trim();
    const url = q ? `/api/usuarios?q=${encodeURIComponent(q)}` : "/api/usuarios";

                const usuarioElemento = document.createElement("div");

                    <div class="col nombre">

                            <i class="fas fa-user-minus"></i>

                        <button class="btn-accion btn-eliminar" title="Eliminar Usuario" onclick="eliminarUsuario('${usuario.ID_USUARIO}')">

}

inputNombre.addEventListener("input", cargarUsuarios);

</script>

{% endblock %}
