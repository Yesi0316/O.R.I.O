{% extends "base.html" %}

{% block title %}Perfil | O.R.I.O{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/perfil.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/modos.css') }}">
{% endblock %}

{% block content %}

<h1 class="title">Mi Perfil</h1>
<p class="subtitle">
Sube tu foto de perfil. Un retrato en primer plano es ideal.
</p>

<div class="photo-card">
    
    <img src="https://via.placeholder.com/200" 
         class="profile-preview" 
         id="preview">

    <br>

    <input type="file" id="fileInput" hidden accept="image/*">

    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-upload"></i> Subir foto de perfil
    </button>

    <p class="min-info">* Mínimo 200 × 200px</p>

</div>

<div class="form-card">
    <h3 class="section-title">Datos de usuario</h3>

    <div class="row">
        <div class="field">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre" disabled>
        </div>

        <div class="field">
            <label>Apellido</label>
            <input type="text" id="apellido" placeholder="Tu apellido" disabled>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Género</label>

            <select id="genero" disabled>
                <option value="">Seleccionar</option>
                <option value="masculino">Masculino</option>
                <option value="femenino">Femenino</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Teléfono</label>
            <input type="text" id="telefono" placeholder="Tu teléfono" disabled>
        </div>

        <div class="field">
            <label>Correo</label>
            <input type="email" id="correo" placeholder="Tu correo" disabled>
        </div>
    </div>
</div>

<div class="buttons-container">
    <button class="save-btn" id="guardarBtn">
        <i class="fas fa-pen"></i> Editar perfil
    </button>

    <button class="cancel-btn" id="cancelBtn" style="display:none;">
        <i class="fas fa-times"></i> Cancelar
    </button>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const guardarBtn = document.getElementById("guardarBtn");
const cancelBtn = document.getElementById("cancelBtn");

// objeto para conservar los valores originales y detectar cambios
let originalData = { nombre: '', apellido: '', telefono: '', correo: '', genero: '' };

// Cargar datos del perfil cuando carga la página
document.addEventListener('DOMContentLoaded', function() {
    cargarDatos();
});

// Cargar datos del perfil
async function cargarDatos() {
    try {
        const res = await fetch('/datos_perfil');
        const data = await res.json();
        
        if (data.ok && data.datos) {
            document.getElementById('nombre').value = data.datos.NOMBRE || '';
            document.getElementById('apellido').value = data.datos.APELLIDO || '';
            document.getElementById('telefono').value = data.datos.TELEFONO || '';
            document.getElementById('correo').value = data.datos.CORREO || '';
            document.getElementById('genero').value = data.datos.GENERO || '';

            preview.src = (data.datos.FOTO_PERFIL && data.datos.FOTO_PERFIL !== 'https://via.placeholder.com/200') 
                ? data.datos.FOTO_PERFIL 
                : 'https://via.placeholder.com/200';
        } else {
            console.error('Error al cargar datos:', data.error);
        }
    } catch (error) {
        console.error('Error cargando datos:', error);
        alert('Error al cargar los datos del perfil');
    }
}

// Subir foto de perfil
fileInput.addEventListener("change", async function(){
    const file = this.files[0];
    if(file){
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) {
            alert('La foto es muy grande. Máximo 5MB');
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e){
            preview.src = e.target.result;
            preview.classList.add("animate");
            setTimeout(()=> preview.classList.remove("animate"), 400);
        }
        reader.readAsDataURL(file);

        const formData = new FormData();
        formData.append('foto', file);

        try {
            const res = await fetch('/subir_foto_perfil', { method:'POST', body: formData });
            const data = await res.json();
            if (!data.ok) {
                alert('Error al subir la foto: ' + (data.error || 'Error desconocido'));
                cargarDatos();
            } else {
                alert('Foto de perfil actualizada correctamente');
            }
        } catch (error) {
            console.error('Error subiendo foto:', error);
            alert('Error al subir la foto');
        }
    }
});

// Guardar cambios / Editar perfil
guardarBtn.addEventListener('click', async function() {

    if (guardarBtn.classList.contains('editing')) {

        const nombre = document.getElementById('nombre').value.trim();
        if (!nombre) { alert('Por favor ingresa tu nombre'); return; }

        const apellido = document.getElementById('apellido').value.trim();
        const telefono = document.getElementById('telefono').value.trim();
        const correo = document.getElementById('correo').value.trim();
        const genero = document.getElementById('genero').value;

        const formData = new FormData();
        formData.append('nombre', nombre);
        formData.append('apellido', apellido);
        formData.append('telefono', telefono);
        formData.append('correo', correo);
        formData.append('genero', genero);

        try {
            const res = await fetch('/guardar_perfil', { method:'POST', body: formData });
            const data = await res.json();

            if (data.ok) {
                alert('¡Perfil actualizado correctamente!');
                originalData = { nombre, apellido, telefono, correo, genero };
                deshabilitarEdicion();
            } else {
                alert('Error: ' + (data.error || 'Error desconocido'));
            }

        } catch (error) {
            console.error('Error guardando:', error);
            alert('Error al guardar los cambios');
        }

    } else {
        habilitarEdicion();
    }

});

// Habilitar campos para edición
function habilitarEdicion() {

    ['nombre','apellido','telefono','correo','genero']
    .forEach(id => document.getElementById(id).disabled = false);

    originalData = {
        nombre: document.getElementById('nombre').value,
        apellido: document.getElementById('apellido').value,
        telefono: document.getElementById('telefono').value,
        correo: document.getElementById('correo').value,
        genero: document.getElementById('genero').value
    };

    guardarBtn.innerHTML = '<i class="fas fa-floppy-disk"></i> Guardar cambios';
    guardarBtn.classList.add('editing');
    guardarBtn.disabled = true;

    cancelBtn.style.display = 'inline-block';

    monitorCambios();
}

// Deshabilitar campos
function deshabilitarEdicion() {

    ['nombre','apellido','telefono','correo','genero']
    .forEach(id => document.getElementById(id).disabled = true);

    guardarBtn.innerHTML = '<i class="fas fa-pen"></i> Editar perfil';
    guardarBtn.classList.remove('editing');
    guardarBtn.disabled = false;

    cancelBtn.style.display = 'none';

    removeChangeListeners();
}

// Verifica cambios
function verificarCambios() {

    const changed = ['nombre','apellido','telefono','correo','genero']
    .some(id => document.getElementById(id).value !== originalData[id]);

    guardarBtn.disabled = !changed;

}

let changeListeners = [];

function monitorCambios() {

    ['nombre','apellido','telefono','correo','genero']
    .forEach(id => {

        const el = document.getElementById(id);

        const listener = () => verificarCambios();

        el.addEventListener('input', listener);

        changeListeners.push({el,listener});

    });

}

function removeChangeListeners() {

    changeListeners.forEach(({el,listener}) => el.removeEventListener('input', listener));

    changeListeners = [];

}

// Cancelar edición
cancelBtn.addEventListener('click', function(){

    if (['nombre','apellido','telefono','correo','genero']
    .some(id => document.getElementById(id).value !== originalData[id])) {

        if (!confirm('¿Seguro que desea salir de las ediciones del perfil? Los cambios se descartarán.')) return;

    }

    ['nombre','apellido','telefono','correo','genero']
    .forEach(id => {

        document.getElementById(id).value = originalData[id];

    });

    deshabilitarEdicion();

});

// Modo de visualización
function aplicarModo(modo) {

    document.body.classList.remove('modo-oscuro','modo-alto-contraste');

    if (modo==='oscuro') document.body.classList.add('modo-oscuro');

    else if (modo==='alto-contraste') document.body.classList.add('modo-alto-contraste');

}

const selectorModo = document.getElementById('selectorModo');

if (selectorModo) {

    selectorModo.addEventListener('change', async function() {

        const modo = this.value;

        aplicarModo(modo);

        try {

            await fetch('/api/tema/actualizar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tema: modo })
            });

        } catch (e) {

            console.error('Error al guardar tema:', e);

        }

    });

}

document.addEventListener('DOMContentLoaded', async function() {

    try {

        const response = await fetch('/api/tema/obtener');

        const data = await response.json();

        const modo = data.ok ? data.tema : 'claro';

        aplicarModo(modo);

        if (selectorModo) selectorModo.value = modo;

    } catch (e) {

        console.error('Error cargando tema:', e);

        aplicarModo('claro');

    }

});
</script>

{% endblock %}
