{% extends "base.html" %}

{% block title %}Perfil | O.R.I.O{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/perfil.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/modos.css') }}">
{% endblock %}

{% block content %}

<h1 class="title">Mi Perfil</h1>
<p class="subtitle">
Sube tu foto de perfil. Un retrato en primer plano es ideal.
</p>

<div class="photo-card">
    
    <img src="https://via.placeholder.com/200" 
         class="profile-preview" 
         id="preview">

    <br>

    <input type="file" id="fileInput" hidden accept="image/*">

    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        <i class="fas fa-upload"></i> Subir foto de perfil
    </button>

    <p class="min-info">* Mínimo 200 × 200px</p>

</div>

<div class="form-card">
    <h3 class="section-title">Datos de usuario</h3>

    <div class="row">
        <div class="field">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="field">
            <label>Apellido</label>
            <input type="text" id="apellido" placeholder="Tu apellido">
        </div>
    </div>

    <div class="row">
        <div class="field">
            <label>Teléfono</label>
            <input type="text" id="telefono" placeholder="Tu teléfono">
        </div>

        <div class="field">
            <label>Correo</label>
            <input type="email" id="correo" placeholder="Tu correo">
        </div>




        

    </div>
</div>

<button class="save-btn" id="guardarBtn">
    <i class="fas fa-floppy-disk"></i> Guardar cambios
</button>

<script>
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const guardarBtn = document.getElementById("guardarBtn");

// Cargar datos del perfil cuando carga la página
document.addEventListener('DOMContentLoaded', function() {
    cargarDatos();
});

// Cargar datos del perfil
async function cargarDatos() {
    try {
        const res = await fetch('/datos_perfil');
        const data = await res.json();
        
        if (data.ok && data.datos) {
            document.getElementById('nombre').value = data.datos.NOMBRE || '';
            document.getElementById('apellido').value = data.datos.APELLIDO || '';
            document.getElementById('telefono').value = data.datos.TELEFONO || '';
            document.getElementById('correo').value = data.datos.CORREO || '';
            
            if (data.datos.FOTO_PERFIL && data.datos.FOTO_PERFIL !== 'https://via.placeholder.com/200') {
                preview.src = data.datos.FOTO_PERFIL;
            }
        }
    } catch (error) {
        console.error('Error cargando datos:', error);
    }
}

// Subir foto de perfil
fileInput.addEventListener("change", async function(){
    const file = this.files[0];

    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            preview.classList.add("animate");

            setTimeout(()=>{
                preview.classList.remove("animate");
            }, 400);
        }

        reader.readAsDataURL(file);

        // Subir foto al servidor
        const formData = new FormData();
        formData.append('foto', file);

        try {
            const res = await fetch('/subir_foto_perfil', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            if (!data.ok) {
                alert('Error al subir la foto: ' + data.error);
                location.reload();
            }
        } catch (error) {
            console.error('Error subiendo foto:', error);
            alert('Error al subir la foto');
        }
    }
});

// Guardar cambios
guardarBtn.addEventListener('click', async function() {
    const nombre = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const correo = document.getElementById('correo').value.trim();

    if (!nombre) {
        alert('Por favor ingresa tu nombre');
        return;
    }

    const formData = new FormData();
    formData.append('nombre', nombre);
    formData.append('apellido', apellido);
    formData.append('telefono', telefono);
    formData.append('correo', correo);

    try {
        const res = await fetch('/guardar_perfil', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();

        if (data.ok) {
            alert('¡Perfil actualizado correctamente!');
        } else {
            alert('Error: ' + data.error);
        }
    } catch (error) {
        console.error('Error guardando:', error);
        alert('Error al guardar los cambios');
    }
});

/* cambiar modos de visualización */
function aplicarModo(modo) {
    // eliminar únicamente nuestras clases de tema
    document.body.classList.remove('modo-oscuro', 'modo-alto-contraste');
    if (modo === 'oscuro') {
        document.body.classList.add('modo-oscuro');
    } else if (modo === 'alto-contraste') {
        document.body.classList.add('modo-alto-contraste');
    }
}

const selectorModo = document.getElementById('selectorModo');

// al cambiar selector guardamos y aplicamos
selectorModo.addEventListener('change', function() {
    const modo = this.value;
    aplicarModo(modo);
    localStorage.setItem('modo', modo);
});

// aplicar la preferencia guardada cuando se carga la página
document.addEventListener('DOMContentLoaded', function() {
    const modo = localStorage.getItem('modo') || 'claro';
    aplicarModo(modo);
    if (selectorModo) selectorModo.value = modo;
});

</script>

{% endblock %}
