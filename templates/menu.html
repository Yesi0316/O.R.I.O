{% extends "base.html" %}

{% block title %}Panel | O.R.I.O{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/menu.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/modos.css') }}">
{% endblock %}

{% block content %}

<div class="header">
<h1>Bienvenido Usuario</h1>
</div>

<!-- BUSCADOR CON FILTROS EN UNA SOLA BARRA -->
<div class="search-section">
<div class="search-bar">
<i class="fas fa-search"></i>
<input type="text" id="motorBusqueda" placeholder="Buscar objeto..." autocomplete="off">
</div>

<select id="categoria" class="filter-select">
<option value="">Todas las categorías</option>
<option value="Documentos">Documentos</option>
<option value="Tecnología">Tecnología</option>
<option value="Accesorios">Accesorios</option>
<option value="Ropa">Ropa</option>
<option value="Llaves">Llaves</option>
<option value="Otros">Otros</option>
</select>

<select id="tipo" class="filter-select">
<option value="">Todos los tipos</option>
<option value="perdido">Perdido</option>
<option value="encontrado">Encontrado</option>
</select>
</div>

<!-- CONTENIDO PRINCIPAL (Se oculta cuando hay búsqueda) -->
<div id="contenidoPrincipal">
<div class="cards">
<div class="card"><h3 id="reportes-totales">-</h3><span>Reportes totales</span></div>
<div class="card"><h3 id="recuperados">-</h3><span>Recuperados</span></div>
<div class="card"><h3 id="pendientes">-</h3><span>Pendientes</span></div>
<div class="card"><h3 id="usuarios-activos">-</h3><span>Usuarios activos</span></div>
</div>

<div class="activity">
<h2>Historial de Actividad</h2>

<div class="activity-box" id="actividadBox">
<!-- Items se generan dinámicamente -->
</div>
</div>
</div>

<!-- RESULTADOS DE BÚSQUEDA (Se muestra cuando hay búsqueda) -->
<div id="resultadosBusqueda" class="grid-resultados" style="display:none;">
</div>


<script>
function toggleFabMenu(){
const fab = document.getElementById("fab");
const menu = document.getElementById("fabMenu");

fab.classList.toggle("active");
menu.classList.toggle("active");
}

// Cargar estadísticas al iniciar la página
async function cargarEstadisticas() {
try {
const res = await fetch('/api/estadisticas');
const datos = await res.json();

document.getElementById('reportes-totales').textContent = datos.reportes_totales;
document.getElementById('recuperados').textContent = datos.recuperados;
document.getElementById('pendientes').textContent = datos.pendientes;
document.getElementById('usuarios-activos').textContent = datos.usuarios_activos;
} catch (error) {
console.error("Error al cargar estadísticas:", error);
// En caso de error, dejar los guiones
}
}

// Cargar estadísticas cuando la página se cargue
document.addEventListener('DOMContentLoaded', () => {
    cargarEstadisticas();
    cargarActividad();
});

// calculadora de tiempo transcurrido
function tiempoTranscurrido(fechaStr) {
    const fecha = new Date(fechaStr);
    const ahora = new Date();
    const diff = ahora - fecha; // ms
    const minutos = Math.floor(diff / 60000);
    if (minutos < 1) return 'Hace unos segundos';
    if (minutos < 60) return `Hace ${minutos} minuto${minutos === 1 ? '' : 's'}`;
    const horas = Math.floor(minutos / 60);
    if (horas < 24) return `Hace ${horas} hora${horas === 1 ? '' : 's'}`;
    const dias = Math.floor(horas / 24);
    return `Hace ${dias} día${dias === 1 ? '' : 's'}`;
}

// Cargar actividad del usuario
async function cargarActividad() {
    try {
        const res = await fetch('/api/actividad');
        const data = await res.json();
        const contenedor = document.getElementById('actividadBox');
        contenedor.innerHTML = '';
        if (data.eventos && data.eventos.length > 0) {
            data.eventos.forEach(ev => {
                const icon = ev.tipo === 'perdido' ? 'fa-search' : 'fa-box';
                const texto = ev.tipo === 'perdido'
                    ? 'Objeto perdido reportado'
                    : 'Objeto encontrado registrado';
                const tiempo = tiempoTranscurrido(ev.fecha);
                const nombre = ev.nombre || '';
                const item = document.createElement('div');
                item.classList.add('activity-item');
                item.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <div>
                        <strong>${texto}</strong>
                        <p>${nombre} - ${tiempo}</p>
                    </div>`;
                contenedor.appendChild(item);
            });
        } else {
            contenedor.innerHTML = '<div style="padding:20px; text-align:center; color:var(--sapphire);">No hay actividad reciente</div>';
        }
    } catch (error) {
        console.error('Error al cargar actividad:', error);
    }
}

// MOTOR DE BÚSQUEDA
const motorBusqueda = document.getElementById("motorBusqueda");
const categoria = document.getElementById("categoria");
const tipo = document.getElementById("tipo");
const contenidoPrincipal = document.getElementById("contenidoPrincipal");
const resultadosBusqueda = document.getElementById("resultadosBusqueda");

async function realizarBusqueda() {
const q = motorBusqueda.value.trim();
const cat = categoria.value;
const tip = tipo.value;

if (!q) {
// Si no hay búsqueda, mostrar contenido principal
contenidoPrincipal.style.display = "block";
resultadosBusqueda.style.display = "none";
return;
}

// Hay búsqueda, ocultar contenido principal
contenidoPrincipal.style.display = "none";
resultadosBusqueda.style.display = "grid";

const params = new URLSearchParams({
q: q,
categoria: cat,
tipo: tip
});

try {
const res = await fetch(`/busquedas?${params.toString()}`);
const datos = await res.json();
resultadosBusqueda.innerHTML = "";

if (datos["datos"] && datos["datos"].length > 0) {
const objetos = datos["datos"];
objetos.forEach(objeto => {
let imagen_html = "";
if (objeto.IMAGEN) {
imagen_html = `<img src="${objeto.IMAGEN}" alt="Imagen del objeto" class="tarjeta-img">`;
}

let html = `<div class="tarjeta-resultado">
${imagen_html}
<div class="tarjeta-contenido">
<div class="tarjeta-titulo">${objeto.NOMBRE}</div>
<div class="tarjeta-categoria">${objeto.CATEGORIA}</div>
<div class="tarjeta-color">${objeto.COLOR}</div>
<a class="tarjeta-btn" href="/detalles/${objeto.ID_OBJETO}">Ver</a>
</div>
</div>`;

resultadosBusqueda.insertAdjacentHTML("beforeend", html);
});
} else {
resultadosBusqueda.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--sapphire); font-size: 14px;">${datos["mensaje"] || "No se encontraron resultados"}</div>`;
}
} catch (error) {
console.error("Error en la búsqueda:", error);
resultadosBusqueda.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: red; font-size: 14px;">Error al realizar la búsqueda</div>`;
}
}

// Event listeners
motorBusqueda.addEventListener("input", realizarBusqueda);
categoria.addEventListener("change", realizarBusqueda);
tipo.addEventListener("change", realizarBusqueda);
</script>

{% endblock %}
