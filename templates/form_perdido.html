{% extends 'base.html' %}

{% block title %}Registrar objeto perdido{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/form_perdido.css') }}">
{% endblock %}

{% block content %}
<div id="malasPracticas">
    <!-- Estrellas doradas dispersas -->
    <div class="star" style="top:5%; left:5%; width:2px; height:2px; animation-duration:1.5s;"></div>
    <div class="star" style="top:10%; left:20%; width:1.5px; height:1.5px; animation-duration:2s;"></div>


    <div class="form-container">
        <!-- botón regresar -->
        <div class="back-btn-container">
            <button type="button" class="btn-config back-btn" onclick="(document.referrer ? history.back() : window.location='/menu')">← Volver</button>
        </div>
        <div class="form-header">
            
            <h1>Registro de Objetos Perdidos</h1>
        </div>

        <form id="reportForm" enctype="multipart/form-data">
            <div class="form-columns">
                <div class="left-column">
                    <label>Nombre del objeto</label>
                    <input type="text" id="nombre_objeto" name="nombre_objeto" maxlength="66" required>

                    <label class="multiple">Estado del objeto</label>
                    <div class="select-wrap">
                        <select id="estado" name="estado" required>
                            <option value="Bueno">Bueno</option>
                            <option value="Regular">Regular</option>
                            <option value="Malo">Malo</option>
                        </select>
                    </div>

                    <label>Color dominante</label>
                    <input type="text" id="color_dominante" name="color_dominante" maxlength="22" required>

                    <label>Lugar donde se perdió</label>
                    <input type="text" name="lugar" required>
                </div>

                <div class="right-column">
                    <label>Fecha de pérdida</label>
                    <input type="date" id="fecha" name="fecha" required>

                    <label>Ficha del aprendiz</label>
                    <input type="number" id="ficha" name="ficha" required>

                    <label class="multiple">Categoría</label>
                    <div class="select-wrap">
                        <select name="categoria" required>
                            {% if categorias %}
                                {% for cat in categorias %}
                                    <option value="{{ cat.ID_CATEGORIA }}">{{ cat.ID_CATEGORIA }}</option>
                                {% endfor %}
                            {% else %}
                                <option value="">Sin categorías</option>
                            {% endif %}
                        </select>
                    </div>

                    <label>Imagen del objeto (opcional)</label>
                    <input type="file" id="imagen" name="imagen" accept="image/*">

                    <label>Comentario (opcional)</label>
                    <textarea name="comentario" maxlength="1000" placeholder="Detalles adicionales"></textarea>
                </div>
            </div>

            <div class="btn-area">
                <button type="submit" class="btn-config">Publicar</button>
                <button type="reset" class="btn-config">Limpiar</button>
            </div>

            <div id="MensajeAlerta" style="margin-top:12px;"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('reportForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const mensajeAlerta = document.getElementById('MensajeAlerta');
            
            try {
                // Mostrar mensaje de carga
                mensajeAlerta.innerHTML = 'Enviando reporte...';
                mensajeAlerta.style.color = '#006bb6';
                
                const response = await fetch('/submit_per', {
                    method: 'POST',
                    body: formData
                });
                
                const text = await response.text();
                let result;
                try {
                    result = JSON.parse(text);
                } catch (err) {
                    console.error("El servidor devolvió HTML en vez de JSON:", text);
                    throw new Error("Error 500: La respuesta del servidor no es válida.");
                }
                
                // Verificar si hay error en la respuesta
                if (result.error || !response.ok) {
                    mensajeAlerta.innerHTML = result.mensaje || "Error al enviar los datos";
                    mensajeAlerta.style.color = "red";
                    console.error("Error:", result);
                } else {
                    mensajeAlerta.innerHTML = result.mensaje || "Reporte enviado correctamente";
                    mensajeAlerta.style.color = "green";
                    // Limpiar formulario
                    form.reset();
                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        window.location.href = '/menu';
                    }, 2000);
                }
            } catch (error) {
                mensajeAlerta.innerHTML = "Error al enviar los datos: " + error.message;
                mensajeAlerta.style.color = "red";
                console.error("Error completo:", error);
            }
        });
    </script>
</div>
{% endblock %}
